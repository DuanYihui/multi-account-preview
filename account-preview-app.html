<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cookie 账号控制台</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #17211d;
      --muted: #68736f;
      --soft: #eef3ef;
      --paper: #faf8f1;
      --panel: #ffffff;
      --line: #d7ded9;
      --green: #105f4a;
      --green-2: #d9efe6;
      --blue: #315f86;
      --amber: #d89621;
      --red: #ae4638;
      --shadow: 0 18px 46px rgba(20, 43, 35, .12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(130deg, rgba(16, 95, 74, .10), transparent 34%),
        linear-gradient(320deg, rgba(216, 150, 33, .14), transparent 38%),
        var(--paper);
      color: var(--ink);
      font-family: "Avenir Next", "PingFang SC", "Hiragino Sans GB", sans-serif;
    }

    .shell {
      width: min(1240px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 28px 0 42px;
    }

    header {
      display: flex;
      justify-content: space-between;
      gap: 22px;
      align-items: end;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(23, 33, 29, .16);
    }

    h1 {
      margin: 0;
      font-size: clamp(32px, 4.6vw, 58px);
      line-height: .96;
      letter-spacing: 0;
    }

    .lead {
      color: var(--muted);
      line-height: 1.65;
      margin: 14px 0 0;
      max-width: 760px;
    }

    .top-actions,
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    button {
      min-height: 40px;
      border-radius: 6px;
      border: 1px solid rgba(23, 33, 29, .14);
      background: var(--green);
      color: #fff;
      padding: 0 14px;
      font-weight: 800;
      cursor: pointer;
    }

    button.secondary {
      color: var(--ink);
      background: #fff;
    }

    button.danger {
      background: var(--red);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: .56;
    }

    .layout {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 20px;
      margin-top: 22px;
      align-items: start;
    }

    .panel {
      background: rgba(255, 255, 255, .9);
      border: 1px solid rgba(23, 33, 29, .12);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .panel h2 {
      margin: 0 0 12px;
      font-size: 18px;
    }

    .suite-list {
      display: grid;
      gap: 10px;
    }

    .suite-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fffdfa;
      padding: 13px;
      display: grid;
      gap: 10px;
    }

    .suite-card.active {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(16, 95, 74, .12);
    }

    .suite-title {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
    }

    .suite-title strong {
      overflow-wrap: anywhere;
    }

    .badge {
      border-radius: 999px;
      padding: 4px 9px;
      font-size: 12px;
      font-weight: 800;
      background: var(--green-2);
      color: var(--green);
      white-space: nowrap;
    }

    .badge.off {
      background: #f2dfdb;
      color: var(--red);
    }

    .page-list {
      display: grid;
      gap: 7px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .page-row {
      background: var(--soft);
      border-radius: 6px;
      padding: 8px;
      overflow-wrap: anywhere;
    }

    .profile {
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 12px;
      color: var(--blue);
      overflow-wrap: anywhere;
    }

    textarea {
      width: 100%;
      min-height: 280px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 12px;
      line-height: 1.48;
      font-size: 13px;
      color: var(--ink);
      background: #fffdfa;
      outline-color: var(--green);
      font-family: "SFMono-Regular", Consolas, monospace;
    }

    .assistant-box {
      display: grid;
      gap: 10px;
    }

    .assistant-box textarea {
      min-height: 118px;
      font-family: inherit;
      font-size: 14px;
    }

    .status {
      min-height: 24px;
      color: var(--green);
      font-size: 13px;
      line-height: 1.5;
      margin-top: 10px;
      white-space: pre-wrap;
    }

    .status.error {
      color: var(--red);
    }

    .config-path {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
      margin-bottom: 12px;
      overflow-wrap: anywhere;
    }

    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 20px;
    }

    @media (max-width: 980px) {
      header,
      .layout,
      .two-col {
        grid-template-columns: 1fr;
        display: grid;
      }

      header {
        align-items: start;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header>
      <section>
        <h1>Cookie 账号控制台</h1>
        <p class="lead">这里选择的不是 Cookie 明文，而是一个独立浏览器 profile。同一环境账号里的移动端和 Web 端共用登录状态，不同账号互相隔离。</p>
      </section>
      <div class="top-actions">
        <button id="launchAll">打开全部启用账号</button>
        <button class="secondary" id="useSamplePreset">套用通用示例模板</button>
        <button class="secondary" id="refresh">刷新</button>
      </div>
    </header>

    <section class="layout">
      <aside class="panel">
        <h2>选择环境账号</h2>
        <div class="suite-list" id="suiteList"></div>
      </aside>

      <section>
        <div class="panel">
          <h2>配置表</h2>
          <div class="config-path" id="configPath"></div>
          <textarea id="configText" spellcheck="false"></textarea>
          <div class="actions">
            <button id="saveConfig">保存配置</button>
            <button class="secondary" id="launchSelected">打开选中账号</button>
            <button class="danger" id="resetSelected">清掉选中登录态</button>
          </div>
          <div class="status" id="status"></div>
        </div>

        <div class="two-col">
          <div class="panel assistant-box">
            <h2>AI 帮我配置</h2>
            <textarea id="prompt" spellcheck="false">帮我配3个环境：生产示例、测试示例、本地示例。每个环境默认1个账号，每个账号都有移动端和后台。</textarea>
            <div class="actions">
              <button id="generate">生成配置</button>
              <button class="secondary" id="generateAndSave">生成并保存</button>
            </div>
          </div>

          <div class="panel">
            <h2>怎么理解</h2>
            <div class="page-list">
              <div class="page-row">同一个环境账号就是同一套 Cookie。比如 测试示例/默认账号 的移动端和后台共用 profile。</div>
              <div class="page-row">不同账号会用不同 user-data-dir，所以 默认账号/账号2/账号3 不会互相顶号。</div>
              <div class="page-row">账号名称可以改，底层 profileKey 不变时，原来的登录态会继续保留。</div>
              <div class="page-row">这里不展示 Cookie 明文，避免登录凭证被复制、截图或误传。</div>
            </div>
          </div>
        </div>
      </section>
    </section>
  </main>

  <script>
    const suiteList = document.querySelector('#suiteList');
    const configText = document.querySelector('#configText');
    const configPath = document.querySelector('#configPath');
    const statusBox = document.querySelector('#status');
    const promptBox = document.querySelector('#prompt');
    let selectedSuite = '';
    let suites = [];

    async function api(path, options = {}) {
      const response = await fetch(path, {
        headers: { 'Content-Type': 'application/json' },
        ...options
      });
      const data = await response.json();
      if (!response.ok) {
        throw new Error(data.output || data.error || '请求失败');
      }
      return data;
    }

    function setStatus(message, isError = false) {
      statusBox.textContent = message;
      statusBox.classList.toggle('error', isError);
    }

    async function loadState() {
      const state = await api('/api/state');
      suites = state.suites;
      configText.value = state.text;
      configPath.textContent = `配置文件：${state.configFile}`;
      if (!selectedSuite && suites[0]) selectedSuite = suites[0].suite;
      renderSuites();
    }

    function renderSuites() {
      suiteList.innerHTML = suites.map((suite) => `
        <article class="suite-card ${suite.suite === selectedSuite ? 'active' : ''}" data-suite="${escapeHtml(suite.suite)}">
          <div class="suite-title">
            <strong>${escapeHtml(suite.suite)}</strong>
            <span class="badge ${suite.enabled ? '' : 'off'}">${suite.enabled ? '启用' : '停用'}</span>
          </div>
          <div class="profile">${escapeHtml(suite.profile)}${suite.profileExists ? ' · 已登录过' : ' · 未初始化'}</div>
          <div class="page-list">
            ${suite.pages.map((page) => `<div class="page-row">${escapeHtml(page.page)}：${escapeHtml(page.url)}</div>`).join('')}
          </div>
        </article>
      `).join('');

      suiteList.querySelectorAll('.suite-card').forEach((card) => {
        card.addEventListener('click', () => {
          selectedSuite = card.dataset.suite;
          renderSuites();
        });
      });
    }

    async function saveConfig() {
      await api('/api/config', {
        method: 'POST',
        body: JSON.stringify({ text: configText.value })
      });
      setStatus('已保存配置');
      await loadState();
    }

    async function launch(suite) {
      setStatus('正在打开 Chrome 窗口...');
      const result = await api('/api/launch', {
        method: 'POST',
        body: JSON.stringify({ suite })
      });
      setStatus(result.output || '已打开');
      await loadState();
    }

    async function resetSelected() {
      if (!selectedSuite) {
        setStatus('先选择一个环境账号', true);
        return;
      }
      const ok = confirm(`清掉「${selectedSuite}」的登录态？这个操作会删除它的独立 profile。`);
      if (!ok) return;
      const result = await api('/api/reset', {
        method: 'POST',
        body: JSON.stringify({ suite: selectedSuite })
      });
      setStatus(result.output || '已清理');
      await loadState();
    }

    async function generateConfig(save) {
      const result = await api('/api/ai-config', {
        method: 'POST',
        body: JSON.stringify({ prompt: promptBox.value })
      });
      configText.value = result.text;
      if (save) await saveConfig();
      else setStatus('已生成配置，确认没问题后点保存');
    }

    async function useSamplePreset() {
      const ok = confirm('套用通用示例模板？当前配置会先自动备份。');
      if (!ok) return;
      const result = await api('/api/sample-preset', { method: 'POST', body: '{}' });
      configText.value = result.text;
      setStatus('已套用通用示例模板，并备份了旧配置');
      await loadState();
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    document.querySelector('#refresh').addEventListener('click', () => loadState().catch((error) => setStatus(error.message, true)));
    document.querySelector('#useSamplePreset').addEventListener('click', () => useSamplePreset().catch((error) => setStatus(error.message, true)));
    document.querySelector('#saveConfig').addEventListener('click', () => saveConfig().catch((error) => setStatus(error.message, true)));
    document.querySelector('#launchAll').addEventListener('click', () => launch('').catch((error) => setStatus(error.message, true)));
    document.querySelector('#launchSelected').addEventListener('click', () => launch(selectedSuite).catch((error) => setStatus(error.message, true)));
    document.querySelector('#resetSelected').addEventListener('click', () => resetSelected().catch((error) => setStatus(error.message, true)));
    document.querySelector('#generate').addEventListener('click', () => generateConfig(false).catch((error) => setStatus(error.message, true)));
    document.querySelector('#generateAndSave').addEventListener('click', () => generateConfig(true).catch((error) => setStatus(error.message, true)));

    loadState().catch((error) => setStatus(error.message, true));
  </script>
</body>
</html>
